
# Validates that all expected Fabric artifacts exist in the repository.
# Runs on every push to catch missing or misconfigured objects early.
name: CI - Validate Fabric Artifacts

on:
  push:
    branches: ["**"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Fabric artifact structure
        run: |
          echo "Validating Fabric artifacts..."

          required=(
            "lh_bronze.Lakehouse"
            "lh_silver.Lakehouse"
            "lh_gold.Lakehouse"
            "notebooks/nb_bronze_coingecko_ingestion.Notebook"
            "notebooks/nb_silver_crypto_transform.Notebook"
            "notebooks/nb_gold_crypto_model.Notebook"
            "pipelines/pl_medallion_orchestration.DataPipeline"
            "semantic models/sm_crypto_medallion.SemanticModel"
          )

          for artifact in "${required[@]}"; do
            if [ ! -d "$artifact" ]; then
              echo "MISSING: $artifact"
              exit 1
            else
              echo "OK: $artifact"
            fi
          done

          echo "All artifacts validated successfully."
